<!DOCTYPE html>
<html>
<head>
<title>Student Result System</title>
<link rel="stylesheet" href="st.css">


</head>

<body>

<div class="container">

<h2>Student Result</h2>

<input type="number" id="s1" placeholder="Subject 1 Marks"><br>
<input type="number" id="s2" placeholder="Subject 2 Marks"><br>
<input type="number" id="s3" placeholder="Subject 3 Marks"><br>
<input type="number" id="s4" placeholder="Subject 4 Marks"><br>
<input type="number" id="s5" placeholder="Subject 5 Marks"><br>

<button onclick="calculate()">Calculate Result</button>

<div id="result"></div>

</div>

<script>

function calculate(){
let s1=Number(document.getElementById("s1").value);
let s2=Number(document.getElementById("s2").value);
let s3=Number(document.getElementById("s3").value);
let s4=Number(document.getElementById("s4").value);
let s5=Number(document.getElementById("s5").value);

let total=s1+s2+s3+s4+s5;
let percentage=total/5;

let division="";

if(percentage>=75)
division="Distinction";

else if(percentage>=60)
division="First Class";

else if(percentage>=50)
division="Second Class";

else
division="Fail";

document.getElementById("result").innerHTML=
"Total Marks = "+total+"<br>"+
"Percentage = "+percentage+"%<br>"+
"Result = "+division;

}

</script>

</body>
</html>
